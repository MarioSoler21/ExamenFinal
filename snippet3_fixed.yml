# Actividad 4: Troubleshooting - Snippet 3 Corregido
test:
  runs-on: ubuntu-latest
  strategy:
    matrix:
      node-version: [16.x, 18.x]
  steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: npm
    - run: npm ci && npm test
